{% extends 'base.html' %}

{% block conteudo %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-warning text-dark fw-bold py-3">
                <i class="bi bi-pencil-square me-2"></i>Alterar Dados do Paciente
            </div>
            <div class="card-body p-4">
                <form action="/pacientes/salvar" method="POST">
                    
                    <input type="hidden" name="id_paciente" value="{{ p[0] }}">
                    
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nome Completo</label>
                        <input type="text" name="nome" class="form-control" value="{{ p[1] }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Telefone</label>
                        <input type="text" name="telefone" class="form-control" value="{{ p[2] }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Tipo Sanguíneo</label>
                        <input type="text" name="tipo_sanguineo" class="form-control" value="{{ p[3] }}" required>
                    </div>
                    
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2">
                            Confirmar Alterações
                        </button>
                        <a href="/pacientes" class="btn btn-light border w-100 py-2">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
