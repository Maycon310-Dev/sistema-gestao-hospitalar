<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Central - Gestão</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-heart-pulse-fill text-danger me-2"></i>Hospital Central

            <div class="navbar-nav">
                <a class="nav-link text-white" href="/pacientes">
                    <i class="bi bi-people-fill me-1"></i> Pacientes

    <div class="container">
        {% block conteudo %}
        {% endblock %}
    </div>

    <footer class="text-center text-muted mt-5 py-4 border-top bg-white">
        <p class="mb-0">&copy; 2026 Sistema de Gestão Hospitalar. Desenvolvido em Flask & SQLite.</p>

</html>
